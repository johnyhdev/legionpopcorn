_merge: deep

cookie_banner:
  enable: true # Enable Cookie banner
  cookieconsent:
    enable: true # Use CookieConsent
    analytics: false
    functionality: true
    marketing: true
    disablePageInteraction: false
    consentModal:
      layout: box
      position: bottom left
    preferencesModal:
      layout: box
      position: bottom left

bootstrap:
  collapse: true   # default true
  dropdown: true   # default true
  modal: true      # default true
  drawer: true  # default true
  carousel: false  # default false
  popover: false   # default false
  scrollspy: false # default false
  tab: false       # default false
  toast: false     # default false
  tooltip: false   # default false

animation: true # default true, Set true to enable
carousel: true # default true, Set false to disable

#logo:
  #header: '/assets/images/logo.svg'
  #footer: '/assets/images/logo-footer.svg' # default: /assets/images/logo.svg

  #dimension
image:
  retina:
    desktop: false # default false, Set true to enable retina for desktop

  xlarge: '1600x'
  desktop: '856x481'
  mobile: '360x200'

thumbnail:
  desktop: '416x234'
  desktop_large: '636x358'
  mobile: '300x169'
  scrollsnap: '240x103'

hero:
  cover: '1600x800'
  cover_mobile: '360x200'